<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- About -->
    <section id="about">
        <h2>About Me</h2>
        <p>Hello! I'm a student passionate about web development.</p>
    </section>

    <!-- Skills -->
    <section id="skills">
        <h2>Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </section>

    <!-- Projects -->
    <section id="projects">
        <h2>Projects</h2>
        <div class="project">
            <h3>Resume Analyzer</h3>
            <p>Analyzes resumes automatically.</p>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact">
        <h2>Contact Me</h2>
        <input type="text" id="name" placeholder="Your Name">
        <button onclick="showMessage()">Submit</button>
        <p id="msg"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
